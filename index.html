<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ランダムポケモン</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>ランダムポケモン</h1>
    <div id="card" class="card" role="button" tabindex="0" aria-label="クリックして新しいポケモンを表示">
      <div id="loading" class="loading hidden">読み込み中...</div>
      <div id="pokemon-view" class="pokemon-view hidden">
        <img id="pokemon-img" src="" alt="" />
        <p id="pokemon-number" class="number"></p>
        <h2 id="pokemon-name" class="name"></h2>
        <div id="pokemon-types" class="types"></div>
      </div>
      <div id="prompt" class="prompt">クリックしてポケモンを表示</div>
    </div>
    <p class="hint">クリックするたびに新しいポケモンが出現します</p>
  </div>
  <script src="app.js"></script>
</body>
</html>
