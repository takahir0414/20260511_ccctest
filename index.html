<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>アラームアプリ</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>⏰ アラーム</h1>
      <div id="current-time" class="current-time"></div>
    </header>

    <section class="add-alarm">
      <h2>アラームを追加</h2>
      <div class="input-row">
        <input type="time" id="alarm-time" />
        <input type="text" id="alarm-label" placeholder="ラベル（任意）" maxlength="30" />
        <button id="add-btn">追加</button>
      </div>
    </section>

    <section class="alarm-list">
      <h2>アラーム一覧</h2>
      <ul id="alarms"></ul>
      <p id="empty-msg" class="empty-msg">アラームはまだありません</p>
    </section>
  </div>

  <!-- Alarm modal -->
  <div id="modal" class="modal hidden">
    <div class="modal-box">
      <div class="modal-icon">⏰</div>
      <h2 id="modal-label">アラーム！</h2>
      <p id="modal-time" class="modal-time"></p>
      <button id="dismiss-btn">止める</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
