<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ストップウォッチ</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>ストップウォッチ</h1>

    <div class="display">
      <span id="minutes">00</span>
      <span class="sep">:</span>
      <span id="seconds">00</span>
      <span class="sep small">.</span>
      <span id="centiseconds" class="small">00</span>
    </div>

    <div class="controls">
      <button id="start-stop" class="btn primary">スタート</button>
      <button id="lap" class="btn secondary" disabled>ラップ</button>
      <button id="reset" class="btn ghost" disabled>リセット</button>
    </div>

    <div class="laps-section" id="laps-section">
      <div class="laps-header">
        <span>ラップ</span>
        <span>ラップタイム</span>
        <span>合計</span>
      </div>
      <ul id="lap-list"></ul>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
